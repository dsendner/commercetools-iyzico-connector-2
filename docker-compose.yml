version: "3.8"

services:
  enabler:
    image: node:24
    restart: always
    depends_on:
      - processor
    command: /bin/sh -c 'npm install && npm run dev -- --host 0.0.0.0 --port 3000'
    env_file:
      - ./enabler/.env
    environment:
      - PROCESSOR_URL=http://localhost:8080
    ports:
      - 3000:3000

  processor:
    image: node:24
    env_file:
      - ./processor/.env.local
    command: /bin/sh -c 'npm install && npm run watch'
    ports:
      - 8080:8080